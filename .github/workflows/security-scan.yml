name: Weekly Security Scan

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual runs

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          echo "## npm audit results" >> $GITHUB_STEP_SUMMARY
          npm audit 2>&1 | tee audit.txt || true
          cat audit.txt >> $GITHUB_STEP_SUMMARY

      - name: Check for outdated packages
        run: |
          echo "## Outdated packages" >> $GITHUB_STEP_SUMMARY
          npm outdated 2>&1 | tee outdated.txt || true
          cat outdated.txt >> $GITHUB_STEP_SUMMARY

      - name: Verify no secrets in codebase
        run: |
          echo "## Secret scan" >> $GITHUB_STEP_SUMMARY
          # Check for common secret patterns in tracked files
          if git grep -lE '(sk-ant-|xai-|re_[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16})' -- ':!.env*' ':!*.example' 2>/dev/null; then
            echo "WARNING: Potential secrets found in tracked files!" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "No secrets detected in tracked files." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Railway API security
        run: |
          echo "## API Security Check" >> $GITHUB_STEP_SUMMARY

          # Health endpoint should be public
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://vallota-trading-production-5585.up.railway.app/api/health)
          echo "Health endpoint: $HTTP_CODE (expect 200)" >> $GITHUB_STEP_SUMMARY

          # Protected endpoints should return 401 without auth
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://vallota-trading-production-5585.up.railway.app/api/status)
          echo "Status endpoint (no auth): $HTTP_CODE (expect 401)" >> $GITHUB_STEP_SUMMARY

          if [ "$HTTP_CODE" != "401" ]; then
            echo "WARNING: Protected endpoint accessible without auth!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Scan Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly security scan found issues. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['security']
            });
